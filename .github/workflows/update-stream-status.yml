name: Update Stream Status (reactive live/offline)

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min
  workflow_dispatch: {}     # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    concurrency:
      group: exnulla-stream-status
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq rsync

      - name: Load SSH key (same as deploy)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add droplet to known_hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Update /stream/status.json (Twitch + atomic rsync)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: /var/www/exnulla-site
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_USER_LOGIN: exnulla
        run: ./scripts/update-stream-status.sh
