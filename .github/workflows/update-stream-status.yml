name: Update Stream Status (reactive live/offline)

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min — matches your spec
  workflow_dispatch: {}     # manual test button in Actions

jobs:
  update:
    runs-on: ubuntu-latest
    concurrency:
      group: exnulla-stream-status
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key (same as deploy)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add droplet to known_hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Update /stream/status.json (atomic)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: /var/www/exnulla-site
        run: ./scripts/update-stream-status.sh
