name: Deploy (prod)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: exnulla-site-prod
      cancel-in-progress: false

    steps:
      # exnulla-site
      - name: Checkout exnulla-site
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # pnpm for exnulla-demos build
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Read demos manifest pin
        id: demos_pin
        shell: bash
        run: |
          set -euo pipefail
          REF="$(node -p "require('./demos/manifest.json').ref")"
          REPO="$(node -p "require('./demos/manifest.json').repo")"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
      - name: Validate demos manifest ref format
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ steps.demos_pin.outputs.ref }}"
          [[ "$REF" =~ ^[0-9a-f]{40}$ ]] || { echo "Invalid demos ref: $REF"; exit 1; }

      # exnulla-demos (TEMP: main; replace with pin once you store a ref in exnulla-site)
      - name: Checkout exnulla-demos (pinned)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.demos_pin.outputs.repo }}
          ref: ${{ steps.demos_pin.outputs.ref }}
          path: exnulla-demos

      - name: Install deps (exnulla-demos)
        run: pnpm install --frozen-lockfile
        working-directory: exnulla-demos

      - name: Build intent-file-router demo
        run: pnpm -C apps/intent-file-router build
        working-directory: exnulla-demos

      - name: Sync demo dist into exnulla-site public
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/public/demos/intent-file-router
          rsync -a --delete \
            exnulla-demos/apps/intent-file-router/dist/ \
            site/public/demos/intent-file-router/
          test -f site/public/demos/intent-file-router/index.html

      # exnulla-site build
      - name: Install deps (root)
        run: npm ci

      - name: Install deps (site)
        run: npm ci
        working-directory: site

      - name: Build (site)
        run: npm run build
        working-directory: site

      - name: Assert build invariants (runner)
        shell: bash
        run: |
          set -euo pipefail
          test -f site/dist/meta/version.json
          test -f site/dist/demos/intent-file-router/index.html

      # deploy
      - name: Load SSH key (agent)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add droplet to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Smoke test runner -> droplet
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'echo runner_ok'

      - name: Deploy to droplet (atomic)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: /var/www/exnulla-site
          LOCAL_DIST: site/dist
          RELEASE_ID: ${{ github.sha }}
        run: ./scripts/deploy-to-droplet.sh
