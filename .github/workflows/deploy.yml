name: Deploy (prod)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: exnulla-site-prod
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (root)
        run: npm ci

      - name: Install deps (site)
        run: npm ci
        working-directory: site

      - name: Build (site)
        run: npm run build
        working-directory: site

            - name: Load SSH key (agent)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add droplet to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Smoke test runner -> droplet
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'echo runner_ok'

      - name: Deploy to droplet (atomic)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: /var/www/exnulla-site
          LOCAL_DIST: site/dist
          RELEASE_ID: ${{ github.sha }}
        run: ./scripts/deploy-to-droplet.sh
