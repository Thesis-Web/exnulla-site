name: docker-runtime-gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Quality gate (prettier + markdownlint)
        run: npm run gate

  docker-runtime-build-and-verify:
    runs-on: ubuntu-latest
    needs: [quality-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image (with provenance)
        run: |
          docker build \
            --build-arg "GIT_SHA=${{ github.sha }}" \
            -t exnulla-site:ci .

      - name: Run container on random port + verify version stamp
        run: |
          set -euo pipefail
          NAME="exnulla-site-ci"
          docker rm -f "$NAME" >/dev/null 2>&1 || true

          docker run -d --name "$NAME" -p 0:80 exnulla-site:ci >/dev/null

          PORT="$(docker port "$NAME" 80/tcp | awk -F: '{print $2}' | tail -n1)"
          echo "PORT=$PORT"

          ok=0
          for _ in {1..30}; do
            if curl -fsS "http://127.0.0.1:${PORT}/meta/version.json" >/dev/null; then
              ok=1
              break
            fi
            sleep 0.2
          done

          if [ "$ok" -ne 1 ]; then
            echo "ERROR: container did not become ready"
            docker ps -a
            docker logs "$NAME" || true
            exit 1
          fi

          echo "version.json:"
          curl -fsS "http://127.0.0.1:${PORT}/meta/version.json"

          curl -fsS "http://127.0.0.1:${PORT}/meta/version.json" | grep -q "${{ github.sha }}"

      - name: Cleanup
        if: always()
        run: docker rm -f exnulla-site-ci >/dev/null 2>&1 || true
